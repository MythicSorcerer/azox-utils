name: AzoxUtils
version: 1.0
main: net.azox.utils.AzoxUtils
api-version: '1.21'
author: Azox
description: A comprehensive utility plugin for Paper servers.
commands:
  anvil:
    description: Open an anvil.
    permission: azox.util.anvil
  azox:
    description: Open AzoxUtils Admin GUI.
    permission: azox.util.admin
    aliases: [azoxadmin]
  azoxreload:
    description: Reload the plugin.
    permission: azox.util.admin
  back:
    description: Go back to your last location.
    permission: azox.util.back
  break:
    description: Break the block you are looking at.
    permission: azox.util.break
  broadcast:
    description: Broadcast a message.
    permission: azox.util.broadcast
    aliases: [bc]
  burn:
    description: Set a player on fire.
    permission: azox.util.burn
  cartographytable:
    description: Open a cartography table.
    permission: azox.util.cartographytable
    aliases: [carttable]
  clearinventory:
    description: Clear inventory.
    permission: azox.util.clearinventory
    aliases: [clear, clean]
  compass:
    description: Show current direction.
    permission: azox.util.compass
  condense:
    description: Condense items into blocks.
    permission: azox.util.condense
    aliases: [compact, toblocks]
  config:
    description: Open configuration menu.
    permission: azox.util.config
    aliases: [cfg, configuration]
  copyitem:
    description: Duplicate the held item.
    permission: azox.util.copyitem
    aliases: [dupe,clone]
  craft:
    description: Open a portable crafting table.
    permission: azox.util.craft
    aliases: [wb, workbench]
  createkit:
    description: Create a kit.
    permission: azox.util.createkit
    aliases: [ck]
  delhome:
    description: Delete a home.
    permission: azox.util.delhome
  deljail:
    description: Delete a jail.
    permission: azox.util.deljail
    aliases: [rmjail]
  delkit:
    description: Delete a kit.
    permission: azox.util.delkit
    aliases: [rmkit]
  edithome:
    description: Edit home details.
    permission: azox.util.edithome
    aliases: [homeinfo]
  enchant:
    description: Enchant an item.
    permission: azox.util.enchant
  enderchest:
    description: Open your enderchest.
    permission: azox.util.enderchest
    aliases: [ec, echest]
  extinguish:
    description: Put out a player who is on fire.
    permission: azox.util.extinguish
  feed:
    description: Feed a player.
    permission: azox.util.feed
    aliases: [eat]
  fillpot:
    description: Enable potion auto-refill.
    permission: azox.util.fillpot
  fillpotsave:
    description: Save potion slots for auto-refill.
    permission: azox.util.fillpot
  fly:
    description: Toggle flight.
    permission: azox.util.fly
  freeze:
    description: Freeze or unfreeze a player.
    permission: azox.util.freeze
  gamemode:
    description: Change gamemode.
    permission: azox.util.gamemode
    aliases: [gm]
  getpos:
    description: Get current coordinates.
    permission: azox.util.getpos
    aliases: [coords]
  gma:
    description: Set adventure mode.
    permission: azox.util.gamemode
  gmc:
    description: Set creative mode.
    permission: azox.util.gamemode
  gms:
    description: Set survival mode.
    permission: azox.util.gamemode
  gmsp:
    description: Set spectator mode.
    permission: azox.util.gamemode
  god:
    description: Toggle god mode.
    permission: azox.util.god
    aliases: [invuln, invulnerable, godmode]
  grindstone:
    description: Open a portable grindstone.
    permission: azox.util.grindstone
  heal:
    description: Heal a player.
    permission: azox.util.heal
  home:
    description: Teleport to your home.
    permission: azox.util.home
  homes:
    description: List your homes.
    permission: azox.util.home
    aliases: [homelist]
  itemname:
    description: Set the display name of the held item.
    permission: azox.util.itemname
  jail:
    description: Jail a player with optional escapable and dramatic effects.
    permission: azox.util.jail
  jumpto:
    description: Teleport to the block you are looking at.
    permission: azox.util.jumpto
  kit:
    description: Claim a kit.
    permission: azox.util.kit
  lightning:
    description: Strike lightning.
    permission: azox.util.lightning
    aliases: [smite,strike]
  lobby:
    description: Teleport to the lobby/hub.
    permission: azox.util.lobby
    aliases: [hub]
  loom:
    description: Open a loom.
    permission: azox.util.loom
  lore:
    description: Change item lore.
    permission: azox.util.lore
  near:
    description: See players within a certain radius.
    permission: azox.util.near
  ilive:
    description: Toggle immortality mode with damage reduction and food healing.
    permission: azox.util.ilive
  nightvision:
    description: Toggle night vision effect.
    permission: azox.util.nightvision
    aliases: [nv, nvt, nightvisiontoggle]
  nv:
    description: Toggle night vision effect.
    permission: azox.util.nightvision
  nvt:
    description: Toggle night vision effect.
    permission: azox.util.nightvision
  nightvisiontoggle:
    description: Toggle night vision effect.
    permission: azox.util.nightvision
  phome:
    description: Teleport to a public home.
    permission: azox.util.phome
    aliases: [publichome]
  ping:
    description: View your ping or another player's ping.
    permission: azox.util.ping
  permeffect:
    description: Apply a permanent potion effect that reapplies on death.
    permission: azox.util.permeffect
  relocatehome:
    description: Relocate a home.
    permission: azox.util.edithome
  remove:
    description: Remove entities that may be causing lag.
    permission: azox.util.remove
  renamehome:
    description: Rename a home.
    permission: azox.util.edithome
  repair:
    description: Repair the held item.
    permission: azox.util.repair
  rtp:
    description: Randomly teleport.
    permission: azox.util.rtp
    aliases: [tpr]
  rules:
    description: Show server rules.
    permission: azox.util.rules
  se:
    description: Quick inspect player enderchest.
    permission: azox.util.see
  see:
    description: Inspect a player's inventory or enderchest.
    permission: azox.util.see
  seen:
    description: See when a player was last online.
    permission: azox.util.seen
  silence:
    description: Toggle silence for command responses.
    permission: azox.util.silence
  sethome:
    description: Set a home at your current location.
    permission: azox.util.sethome
  setjail:
    description: Set a jail location.
    permission: azox.util.setjail
  setphome:
    description: Set a public home.
    permission: azox.util.setphome
  setspawn:
    description: Set spawn location.
    permission: azox.util.setspawn
  setwarp:
    description: Set a warp.
    permission: azox.util.setwarp
  settings:
    description: Configure personal settings.
    permission: azox.util.settings
  si:
    description: Quick inspect player inventory.
    permission: azox.util.see
  spawn:
    description: Teleport to spawn.
    permission: azox.util.spawn
  speed:
    description: Set walk or fly speed.
    permission: azox.util.speed
    aliases: [walkspeed, flyspeed]
  stats:
    description: See player statistics.
    permission: azox.util.stats
  stonecutter:
    description: Open a portable stonecutter.
    permission: azox.util.stonecutter
  storm:
    description: Set weather to storm.
    permission: azox.util.weather
  sudo:
    description: Force a player to run a command.
    permission: azox.util.sudo
  suicide:
    description: Kill yourself.
    permission: azox.util.suicide
  sun:
    description: Set weather to sun.
    permission: azox.util.weather
  tempban:
    description: Temporarily ban a player.
    permission: azox.util.tempban
  top:
    description: Teleport to the highest safe block.
    permission: azox.util.top
  tp:
    description: Teleport command.
    permission: azox.util.tp
  tpaccept:
    description: Accept a teleport request.
    permission: azox.util.tpa
  tpa:
    description: Request to teleport to a player.
    permission: azox.util.tpa
    aliases: [tpask]
  tpahere:
    description: Request a player to teleport to you.
    permission: azox.util.tpahere
  tpdecline:
    description: Decline a teleport request.
    permission: azox.util.tpa
  tpignore:
    description: Ignore teleport requests.
    permission: azox.util.tpignore
  tpo:
    description: Teleport to a player (including offline).
    permission: azox.util.tpo
    aliases: [tpoffline]
  tpohere:
    description: Teleport a player to you (including offline).
    permission: azox.util.tpo
  tpoundo:
    description: Undo a tpohere.
    permission: azox.util.tpo
  tps:
    description: View server TPS and memory.
    permission: azox.util.tps
  trash:
    description: Open a disposal inventory.
    permission: azox.util.trash
    aliases: [disposal]
  unjail:
    description: Unjail a player.
    permission: azox.util.jail
  unfillpot:
    description: Disable potion auto-refill.
    permission: azox.util.fillpot
  uptime:
    description: See how long the server has been running.
    permission: azox.util.tps
  utilities:
    description: Open the utility hub.
    permission: azox.util.gui
    aliases: [utils]
  vanish:
    description: Hide from other players.
    permission: azox.util.vanish
    aliases: [v]
  warp:
    description: Teleport to a warp.
    permission: azox.util.warp
  weather:
    description: Change weather.
    permission: azox.util.weather
  whois:
    description: Get information about a player.
    permission: azox.util.whois
  world:
    description: Teleport to a different world.
    permission: azox.util.world
permissions:
  azox.util.*:
    description: All player-use commands (granted to all players when no permission manager is present)
    default: true
    children:
      azox.util.tpa: true
      azox.util.tpahere: true
      azox.util.tpaccept: true
      azox.util.tpdecline: true
      azox.util.tpignore: true
      azox.util.home: true
      azox.util.sethome: true
      azox.util.delhome: true
      azox.util.edithome: true
      azox.util.phome: true
      azox.util.back: true
      azox.util.rtp: true
      azox.util.spawn: true
      azox.util.lobby: true
      azox.util.warp: true
      azox.util.gui: true
      azox.util.config: true
      azox.util.settings: true
      azox.util.enderchest: true
      azox.util.craft: true
      azox.util.anvil: true
      azox.util.grindstone: true
      azox.util.stonecutter: true
      azox.util.cartographytable: true
      azox.util.loom: true
      azox.util.trash: true
      azox.util.fly: true
      azox.util.god: true
      azox.util.heal: true
      azox.util.feed: true
      azox.util.gamemode: true
      azox.util.speed: true
      azox.util.nightvision: true
      azox.util.ping: true
      azox.util.stats: true
      azox.util.uptime: true
      azox.util.tps: true
      azox.util.rules: true
      azox.util.compass: true
      azox.util.getpos: true
      azox.util.near: true
      azox.util.top: true
      azox.util.jumpto: true
      azox.util.world: true
      azox.util.weather: true
      azox.util.sun: true
      azox.util.storm: true
      azox.util.suicide: true
      azox.util.clearinventory: true
      azox.util.condense: true
      azox.util.kit: true
      azox.util.seen: true
      azox.util.whois: true
      azox.util.permeffect: true
      azox.util.ilive: true
      azox.util.fillpot: true
      azox.util.silence: true
  azox.util.rank.*:
    description: Advanced permissions for ranked players
    default: false
    children:
      azox.util.enderchest.pages.2: true
      azox.util.enderchest.pages.3: true
      azox.util.enderchest.pages.4: true
      azox.util.enderchest.pages.5: true
      azox.util.vanish.level.1: true
      azox.util.vanish.level.2: true
      azox.util.vanish.level.3: true
      azox.util.vanish.level.4: true
      azox.util.vanish.level.5: true
      azox.util.particles.*: true
      azox.util.rank.owner: true
      azox.util.rank.admin: true
      azox.util.rank.mod: true
      azox.util.rank.vip: true
  azox.util.admin.*:
    description: All admin-only commands
    default: op
    children:
      azox.util.admin: true
      azox.util.vanish: true
      azox.util.vanish.see: true
      azox.util.see: true
      azox.util.jail: true
      azox.util.setjail: true
      azox.util.deljail: true
      azox.util.freeze: true
      azox.util.sudo: true
      azox.util.lightning: true
      azox.util.burn: true
      azox.util.extinguish: true
      azox.util.tempban: true
      azox.util.break: true
      azox.util.broadcast: true
      azox.util.copyitem: true
      azox.util.enchant: true
      azox.util.itemname: true
      azox.util.lore: true
      azox.util.repair: true
      azox.util.setwarp: true
      azox.util.setphome: true
      azox.util.setspawn: true
      azox.util.createkit: true
      azox.util.delkit: true
      azox.util.remove: true
      azox.util.tp: true
      azox.util.tpo: true
      azox.util.tpohere: true
      azox.util.tpoundo: true
      azox.util.gamemode: true
      azox.util.azoxreload: true
