name: AzoxUtils
version: 1.0
main: com.azox.utils.AzoxUtils
api-version: '1.21'
author: Azox
description: A comprehensive utility plugin for Paper servers.
commands:
  anvil:
    description: Open an anvil.
    permission: azox.utils.anvil
  azox:
    description: Open AzoxUtils Admin GUI.
    permission: azox.utils.admin
    aliases: [azoxadmin]
  azoxreload:
    description: Reload the plugin.
    permission: azox.utils.admin
  back:
    description: Go back to your last location.
    permission: azox.utils.back
  break:
    description: Break the block you are looking at.
    permission: azox.utils.break
  broadcast:
    description: Broadcast a message.
    permission: azox.utils.broadcast
    aliases: [bc]
  burn:
    description: Set a player on fire.
    permission: azox.utils.burn
  cartographytable:
    description: Open a cartography table.
    permission: azox.utils.cartographytable
    aliases: [carttable]
  clearinventory:
    description: Clear inventory.
    permission: azox.utils.clearinventory
    aliases: [clear, clean]
  compass:
    description: Show current direction.
    permission: azox.utils.compass
  condense:
    description: Condense items into blocks.
    permission: azox.utils.condense
    aliases: [compact, toblocks]
  config:
    description: Open configuration menu.
    permission: azox.utils.config
    aliases: [cfg, configuration]
  copyitem:
    description: Duplicate the held item.
    permission: azox.utils.copyitem
  craft:
    description: Open a portable crafting table.
    permission: azox.utils.craft
    aliases: [wb, workbench]
  createkit:
    description: Create a kit.
    permission: azox.utils.createkit
    aliases: [ck]
  delhome:
    description: Delete a home.
    permission: azox.utils.delhome
  deljail:
    description: Delete a jail.
    permission: azox.utils.deljail
    aliases: [rmjail]
  delkit:
    description: Delete a kit.
    permission: azox.utils.delkit
    aliases: [rmkit]
  edithome:
    description: Edit home details.
    permission: azox.utils.edithome
    aliases: [homeinfo]
  enchant:
    description: Enchant an item.
    permission: azox.utils.enchant
  enderchest:
    description: Open your enderchest.
    permission: azox.utils.enderchest
    aliases: [ec, echest]
  extinguish:
    description: Put out a player who is on fire.
    permission: azox.utils.extinguish
  feed:
    description: Feed a player.
    permission: azox.utils.feed
    aliases: [eat]
  fly:
    description: Toggle flight.
    permission: azox.utils.fly
  freeze:
    description: Freeze or unfreeze a player.
    permission: azox.utils.freeze
  gamemode:
    description: Change gamemode.
    permission: azox.utils.gamemode
    aliases: [gm]
  getpos:
    description: Get current coordinates.
    permission: azox.utils.getpos
    aliases: [coords]
  gma:
    description: Set adventure mode.
    permission: azox.utils.gamemode
  gmc:
    description: Set creative mode.
    permission: azox.utils.gamemode
  gms:
    description: Set survival mode.
    permission: azox.utils.gamemode
  gmsp:
    description: Set spectator mode.
    permission: azox.utils.gamemode
  god:
    description: Toggle god mode.
    permission: azox.utils.god
    aliases: [invuln, invulnerable, godmode]
  grindstone:
    description: Open a portable grindstone.
    permission: azox.utils.grindstone
  heal:
    description: Heal a player.
    permission: azox.utils.heal
  home:
    description: Teleport to your home.
    permission: azox.utils.home
  homes:
    description: List your homes.
    permission: azox.utils.home
    aliases: [homelist]
  itemname:
    description: Set the display name of the held item.
    permission: azox.utils.itemname
  jail:
    description: Jail a player with optional escapable and dramatic effects.
    permission: azox.utils.jail
  jumpto:
    description: Teleport to the block you are looking at.
    permission: azox.utils.jumpto
  kit:
    description: Claim a kit.
    permission: azox.utils.kit
  lightning:
    description: Strike lightning.
    permission: azox.utils.lightning
  lobby:
    description: Teleport to the lobby/hub.
    permission: azox.utils.lobby
    aliases: [hub]
  loom:
    description: Open a loom.
    permission: azox.utils.loom
  lore:
    description: Change item lore.
    permission: azox.utils.lore
  near:
    description: See players within a certain radius.
    permission: azox.utils.near
  nightvision:
    description: Toggle night vision effect.
    permission: azox.utils.nightvision
    aliases: [nv, nvt, nightvisiontoggle]
  nv:
    description: Toggle night vision effect.
    permission: azox.utils.nightvision
  nvt:
    description: Toggle night vision effect.
    permission: azox.utils.nightvision
  nightvisiontoggle:
    description: Toggle night vision effect.
    permission: azox.utils.nightvision
  phome:
    description: Teleport to a public home.
    permission: azox.utils.phome
    aliases: [publichome]
  ping:
    description: View your ping or another player's ping.
    permission: azox.utils.ping
  relocatehome:
    description: Relocate a home.
    permission: azox.utils.edithome
  remove:
    description: Remove entities that may be causing lag.
    permission: azox.utils.remove
  renamehome:
    description: Rename a home.
    permission: azox.utils.edithome
  repair:
    description: Repair the held item.
    permission: azox.utils.repair
  rtp:
    description: Randomly teleport.
    permission: azox.utils.rtp
    aliases: [tpr]
  rules:
    description: Show server rules.
    permission: azox.utils.rules
  se:
    description: Quick inspect player enderchest.
    permission: azox.utils.see
  see:
    description: Inspect a player's inventory or enderchest.
    permission: azox.utils.see
  seen:
    description: See when a player was last online.
    permission: azox.utils.seen
  sethome:
    description: Set a home at your current location.
    permission: azox.utils.sethome
  setjail:
    description: Set a jail location.
    permission: azox.utils.setjail
  setphome:
    description: Set a public home.
    permission: azox.utils.setphome
  setspawn:
    description: Set spawn location.
    permission: azox.utils.setspawn
  setwarp:
    description: Set a warp.
    permission: azox.utils.setwarp
  settings:
    description: Configure personal settings.
    permission: azox.utils.settings
  si:
    description: Quick inspect player inventory.
    permission: azox.utils.see
  spawn:
    description: Teleport to spawn.
    permission: azox.utils.spawn
  speed:
    description: Set walk or fly speed.
    permission: azox.utils.speed
    aliases: [walkspeed, flyspeed]
  stats:
    description: See player statistics.
    permission: azox.utils.stats
  stonecutter:
    description: Open a portable stonecutter.
    permission: azox.utils.stonecutter
  storm:
    description: Set weather to storm.
    permission: azox.utils.weather
  sudo:
    description: Force a player to run a command.
    permission: azox.utils.sudo
  suicide:
    description: Kill yourself.
    permission: azox.utils.suicide
  sun:
    description: Set weather to sun.
    permission: azox.utils.weather
  tempban:
    description: Temporarily ban a player.
    permission: azox.utils.tempban
  top:
    description: Teleport to the highest safe block.
    permission: azox.utils.top
  tp:
    description: Teleport command.
    permission: azox.utils.tp
  tpaccept:
    description: Accept a teleport request.
    permission: azox.utils.tpa
  tpa:
    description: Request to teleport to a player.
    permission: azox.utils.tpa
    aliases: [tpask]
  tpahere:
    description: Request a player to teleport to you.
    permission: azox.utils.tpahere
  tpdecline:
    description: Decline a teleport request.
    permission: azox.utils.tpa
  tpignore:
    description: Ignore teleport requests.
    permission: azox.utils.tpignore
  tpo:
    description: Teleport to a player (including offline).
    permission: azox.utils.tpo
    aliases: [tpoffline]
  tpohere:
    description: Teleport a player to you (including offline).
    permission: azox.utils.tpo
  tpoundo:
    description: Undo a tpohere.
    permission: azox.utils.tpo
  tps:
    description: View server TPS and memory.
    permission: azox.utils.tps
  trash:
    description: Open a disposal inventory.
    permission: azox.utils.trash
    aliases: [disposal]
  unjail:
    description: Unjail a player.
    permission: azox.utils.jail
  uptime:
    description: See how long the server has been running.
    permission: azox.utils.tps
  utilities:
    description: Open the utility hub.
    permission: azox.utils.gui
    aliases: [utils]
  vanish:
    description: Hide from other players.
    permission: azox.utils.vanish
    aliases: [v]
  warp:
    description: Teleport to a warp.
    permission: azox.utils.warp
  weather:
    description: Change weather.
    permission: azox.utils.weather
  whois:
    description: Get information about a player.
    permission: azox.utils.whois
  world:
    description: Teleport to a different world.
    permission: azox.utils.world
permissions:
  azox.user.*:
    description: All player-use commands
    default: false
    children:
      azox.utils.tpa: true
      azox.utils.tpahere: true
      azox.utils.tpaccept: true
      azox.utils.tpdecline: true
      azox.utils.tpignore: true
      azox.utils.home: true
      azox.utils.sethome: true
      azox.utils.delhome: true
      azox.utils.edithome: true
      azox.utils.phome: true
      azox.utils.back: true
      azox.utils.rtp: true
      azox.utils.spawn: true
      azox.utils.lobby: true
      azox.utils.warp: true
      azox.utils.gui: true
      azox.utils.config: true
      azox.utils.settings: true
      azox.utils.enderchest: true
      azox.utils.craft: true
      azox.utils.anvil: true
      azox.utils.grindstone: true
      azox.utils.stonecutter: true
      azox.utils.cartographytable: true
      azox.utils.loom: true
      azox.utils.trash: true
      azox.utils.fly: true
      azox.utils.god: true
      azox.utils.heal: true
      azox.utils.feed: true
      azox.utils.gamemode: true
      azox.utils.speed: true
      azox.utils.nightvision: true
      azox.utils.ping: true
      azox.utils.stats: true
      azox.utils.uptime: true
      azox.utils.tps: true
      azox.utils.rules: true
      azox.utils.compass: true
      azox.utils.getpos: true
      azox.utils.near: true
      azox.utils.top: true
      azox.utils.jumpto: true
      azox.utils.world: true
      azox.utils.weather: true
      azox.utils.sun: true
      azox.utils.storm: true
      azox.utils.suicide: true
      azox.utils.clearinventory: true
      azox.utils.condense: true
      azox.utils.kit: true
      azox.utils.seen: true
      azox.utils.whois: true
  azox.rank.*:
    description: Advanced permissions for ranked players
    default: false
    children:
      azox.utils.enderchest.pages.2: true
      azox.utils.enderchest.pages.3: true
      azox.utils.enderchest.pages.4: true
      azox.utils.enderchest.pages.5: true
      azox.utils.vanish.level.1: true
      azox.utils.vanish.level.2: true
      azox.utils.vanish.level.3: true
      azox.utils.vanish.level.4: true
      azox.utils.vanish.level.5: true
      azox.utils.particles.*: true
      azox.utils.rank.owner: true
      azox.utils.rank.admin: true
      azox.utils.rank.mod: true
      azox.utils.rank.vip: true
  azox.admin.*:
    description: All admin-only commands
    default: op
    children:
      azox.utils.admin: true
      azox.utils.vanish: true
      azox.utils.vanish.see: true
      azox.utils.see: true
      azox.utils.jail: true
      azox.utils.setjail: true
      azox.utils.deljail: true
      azox.utils.freeze: true
      azox.utils.sudo: true
      azox.utils.lightning: true
      azox.utils.burn: true
      azox.utils.extinguish: true
      azox.utils.tempban: true
      azox.utils.break: true
      azox.utils.broadcast: true
      azox.utils.copyitem: true
      azox.utils.enchant: true
      azox.utils.itemname: true
      azox.utils.lore: true
      azox.utils.repair: true
      azox.utils.setwarp: true
      azox.utils.setphome: true
      azox.utils.setspawn: true
      azox.utils.createkit: true
      azox.utils.delkit: true
      azox.utils.remove: true
      azox.utils.tp: true
      azox.utils.tpo: true
      azox.utils.tpohere: true
      azox.utils.tpoundo: true
      azox.utils.gamemode: true
      azox.utils.azoxreload: true
